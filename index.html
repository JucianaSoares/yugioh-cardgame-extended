<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>YU-GI-OH! Card Game</title>
</head>
<link rel="stylesheet" href="src/styles/reset.css">

<link rel="stylesheet" href="src/styles/buttons.css">
<link rel="stylesheet" href="src/styles/containers_and_frames.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<link rel="shortcut icon" href="src/assets/favicon/Favicon.ico" type="image/x-icon" />

<link rel="stylesheet" href="src/styles/main.css">

<body>
  <audio id="bmg" loop>
    <source src="src/assets/audios/egyptian_duel.mp3" type="audio/mp3"/>
  </audio>
  
  <div class="bg-video">
    <video class="video" autoplay loop muted>
      <source src="src/assets/video/yugi.mp4" type="video/mp4"/>
    </video>
  </div>
  
 <div class="container">
  <div class="container__left framed-golden-2">
    <div class="score_box frame">
 <p id="lp_points">PLAYER LP: 8000 | COMP LP: 8000</p>
    </div>
    <div class="menu_avatar">
      <img id="card-image"> 
    </div>
    <div class="card_details frame">
      <p id="card-name">Selecione</p>
      <p id="card-type">uma carta</p>
      <p id="card-atk">ATK: 0</p>
      <p id="card-def">DEF: 0</p>
    </div>
    <div class="battle_log frame">
  <p id="log-text">Aguardando duelo...</p>
</div>
 </div>

  <div class="container__right">
    <div class="card-box__container">
      <div class="card-box framed" id="computer-cards"></div>
      
      <div class="card-versus_container">
        <div class="versus-top">
          <div class="card-infield">
            <img id="player-field-card">
          </div>
          <img id= "millenium--icon" src="src/assets/icons/millenium2.png">
          <div class="card-infield">
            <img id="computer-field-card" >
          </div>
        </div> <div class="versus-buttom">
          <button id="next-duel" class="rpgui-button" onclick="resetDuel()">PRÓXIMO TURNO</button>
        </div>
      </div> <div class="card-box framed" id="player-cards"></div>
    </div> </div> 
    </div>
  <div id="summon-menu" class="rpgui-container framed" style="display: none;">
    <h3>Posição de Batalha</h3>
    <div class="menu-buttons">
        <button id="btn-atk" class="rpgui-button"><span>ATAQUE</span></button>
        <button id="btn-def" class="rpgui-button"><span>DEFESA</span></button>
        </div>
    </div>
   <script src="src/scripts/engine.js" defer></script>
   </body>
</html>
